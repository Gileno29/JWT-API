version: '3.9'

services:
  postgres:
    build:
      context: ./db
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api123
      POSTGRES_DB: appdb
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app:
    build:
      context: ..
      dockerfile: infraestruture/app/Dockerfile
    container_name: golang_app
    restart: always
    depends_on:
      postgres: 
        condition: service_healthy
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USER: api
      DB_PASSWORD: api123
      DB_NAME: appdb
    ports:
      - "8090:8090"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge